<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#86efac" font-size="18" font-weight="bold">Ghost Sender — Fixed Configuration</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">Partner Connector or Transport Rule Applied • Only MX Gateway Accepted</text>

  <!-- Attacker -->
  <rect x="30" y="80" width="140" height="60" rx="10" fill="#7f1d1d" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="106" text-anchor="middle" fill="#fca5a5" font-size="11">🌐 Attacker</text>
  <text x="100" y="124" text-anchor="middle" fill="#fca5a5" font-size="10">Clean IP</text>

  <!-- Arrow Attacker → BLOCKED -->
  <line x1="170" y1="95" x2="320" y2="200" stroke="#dc2626" stroke-width="3" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>

  <!-- BLOCKED Box -->
  <rect x="330" y="180" width="160" height="60" rx="10" fill="#7f1d1d" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="410" y="206" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">⛔ REJECTED</text>
  <text x="410" y="226" text-anchor="middle" fill="#fca5a5" font-size="9">IP not in gateway range</text>

  <!-- Label: connector rule -->
  <rect x="340" y="250" width="140" height="30" rx="6" fill="#1e1b4b"/>
  <text x="410" y="269" text-anchor="middle" fill="#a5b4fc" font-size="10">Connector / Transport Rule</text>

  <!-- Legitimate sender -->
  <rect x="30" y="280" width="140" height="60" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="306" text-anchor="middle" fill="#86efac" font-size="11">✉️ Legitimate Sender</text>
  <text x="100" y="324" text-anchor="middle" fill="#86efac" font-size="10">Authorized Server</text>

  <!-- Arrow Legitimate → MX (Green) -->
  <line x1="170" y1="295" x2="390" y2="350" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- MX Gateway -->
  <rect x="400" y="80" width="150" height="60" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="475" y="106" text-anchor="middle" fill="#86efac" font-size="11">🛡️ MX Gateway</text>
  <text x="475" y="124" text-anchor="middle" fill="#86efac" font-size="10">Authorized IP Range ✓</text>

  <!-- Arrow MX → M365 (Green) -->
  <line x1="550" y1="110" x2="630" y2="200" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <rect x="550" y="125" width="100" height="40" rx="6" fill="#14532d" opacity="0.9"/>
  <text x="600" y="141" text-anchor="middle" fill="#86efac" font-size="10">IP Matches</text>
  <text x="600" y="157" text-anchor="middle" fill="#86efac" font-size="9">Connector ✓</text>

  <!-- M365 EOP -->
  <rect x="640" y="190" width="140" height="80" rx="10" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="218" text-anchor="middle" fill="#7dd3fc" font-size="12">🔄 Exchange Online</text>
  <text x="710" y="238" text-anchor="middle" fill="#7dd3fc" font-size="10">M365 EOP</text>
  <text x="710" y="258" text-anchor="middle" fill="#86efac" font-size="9" font-weight="bold">✓ Authenticated</text>

  <!-- Arrow M365 → Inbox -->
  <line x1="710" y1="270" x2="710" y2="340" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Inbox -->
  <rect x="610" y="340" width="200" height="70" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="368" text-anchor="middle" fill="#86efac" font-size="13">📥 User Inbox</text>
  <text x="710" y="388" text-anchor="middle" fill="#86efac" font-size="11">Delivered ✓</text>
  <text x="710" y="403" text-anchor="middle" fill="#94a3b8" font-size="10">Only from MX gateway</text>

  <!-- Fix Description -->
  <rect x="30" y="370" width="320" height="120" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="395" text-anchor="middle" fill="#86efac" font-size="12" font-weight="bold">✅ Fix Applied — Secure</text>
  <text x="190" y="415" text-anchor="middle" fill="#86efac" font-size="10">• Partner Organization Connector</text>
  <text x="190" y="435" text-anchor="middle" fill="#86efac" font-size="10">• Restricted to MX Gateway IPs</text>
  <text x="190" y="455" text-anchor="middle" fill="#86efac" font-size="10">• Direct M365 EOP connections rejected</text>
  <text x="190" y="475" text-anchor="middle" fill="#94a3b8" font-size="9">Only mail from the authorized gateway reaches the tenant</text>

  <!-- Footer -->
  <text x="400" y="508" text-anchor="middle" fill="#475569" font-size="9">Ghost Sender PoC • labs.infoguard.ch/posts/ghost-sender</text>
</svg>
