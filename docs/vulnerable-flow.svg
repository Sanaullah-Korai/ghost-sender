<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" font-family="system-ui, sans-serif">
  <defs>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="#0f172a" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#f1f5f9" font-size="18" font-weight="bold">Ghost Sender — Vulnerable Configuration</text>
  <text x="400" y="55" text-anchor="middle" fill="#94a3b8" font-size="12">External MX Record • No Partner Connector • No Transport Rule</text>

  <!-- Attacker -->
  <rect x="30" y="80" width="140" height="60" rx="10" fill="#7f1d1d" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="106" text-anchor="middle" fill="#fca5a5" font-size="11">🌐 Attacker</text>
  <text x="100" y="124" text-anchor="middle" fill="#fca5a5" font-size="10">Any Clean IP</text>

  <!-- Arrow Attacker → M365 EOP (Direct - Red) -->
  <line x1="170" y1="95" x2="350" y2="200" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arrowRed)"/>
  <rect x="200" y="120" width="180" height="40" rx="6" fill="#7f1d1d" opacity="0.9"/>
  <text x="290" y="136" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="bold">① Direct to M365 EOP</text>
  <text x="290" y="152" text-anchor="middle" fill="#fca5a5" font-size="9">domain-com.mail.protection.outlook.com:25</text>

  <!-- Legitimate sender -->
  <rect x="30" y="280" width="140" height="60" rx="10" fill="#1e293b" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="306" text-anchor="middle" fill="#94a3b8" font-size="11">✉️ Legitimate Sender</text>
  <text x="100" y="324" text-anchor="middle" fill="#94a3b8" font-size="10">Authorized Server</text>

  <!-- Arrow Legitimate → MX (Green) -->
  <line x1="170" y1="295" x2="350" y2="220" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <rect x="200" y="235" width="200" height="40" rx="6" fill="#14532d" opacity="0.9"/>
  <text x="300" y="251" text-anchor="middle" fill="#86efac" font-size="10">② Legit Path (via MX)</text>
  <text x="300" y="267" text-anchor="middle" fill="#86efac" font-size="9">MX Record → Gateway → M365</text>

  <!-- MX Gateway -->
  <rect x="370" y="80" width="150" height="60" rx="10" fill="#1e1b4b" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="445" y="106" text-anchor="middle" fill="#a5b4fc" font-size="11">🛡️ MX Gateway</text>
  <text x="445" y="124" text-anchor="middle" fill="#a5b4fc" font-size="10">Third-party Filter</text>

  <!-- Arrow MX → M365 (Blue) -->
  <line x1="520" y1="110" x2="630" y2="200" stroke="#6366f1" stroke-width="2" marker-end="url(#arrowGray)"/>
  <rect x="530" y="130" width="120" height="40" rx="6" fill="#1e1b4b" opacity="0.9"/>
  <text x="590" y="146" text-anchor="middle" fill="#a5b4fc" font-size="10">Trusted Path</text>
  <text x="590" y="160" text-anchor="middle" fill="#a5b4fc" font-size="9">Already Filtered</text>

  <!-- M365 EOP -->
  <rect x="640" y="190" width="140" height="80" rx="10" fill="#0c4a6e" stroke="#0ea5e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="218" text-anchor="middle" fill="#7dd3fc" font-size="12">🔄 Exchange Online</text>
  <text x="710" y="238" text-anchor="middle" fill="#7dd3fc" font-size="10">M365 EOP</text>
  <text x="710" y="258" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">⚠ No Auth Check</text>

  <!-- Arrow M365 → Inbox -->
  <line x1="710" y1="270" x2="710" y2="340" stroke="#0ea5e9" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Inbox -->
  <rect x="610" y="340" width="200" height="70" rx="10" fill="#14532d" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="710" y="368" text-anchor="middle" fill="#86efac" font-size="13">📥 User Inbox</text>
  <text x="710" y="388" text-anchor="middle" fill="#86efac" font-size="11">Delivered ✓</text>
  <text x="710" y="403" text-anchor="middle" fill="#fbbf24" font-size="10">No warning banner</text>

  <!-- Auth Failures Box -->
  <rect x="30" y="370" width="320" height="120" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="190" y="395" text-anchor="middle" fill="#f87171" font-size="12" font-weight="bold">All Authentication Bypassed</text>
  <text x="190" y="420" text-anchor="middle" fill="#94a3b8" font-size="10">SPF <tspan fill="#f87171">✗ FAIL</tspan> (-all hard fail ignored)</text>
  <text x="190" y="440" text-anchor="middle" fill="#94a3b8" font-size="10">DKIM <tspan fill="#f87171">✗ NONE</tspan> (no signature required)</text>
  <text x="190" y="460" text-anchor="middle" fill="#94a3b8" font-size="10">DMARC <tspan fill="#f87171">✗ FAIL</tspan> (p=reject ignored)</text>
  <text x="190" y="480" text-anchor="middle" fill="#fbbf24" font-size="9">Exchange Online trusts direct connections when external MX exists</text>

  <!-- Footer -->
  <text x="400" y="508" text-anchor="middle" fill="#475569" font-size="9">Ghost Sender PoC • labs.infoguard.ch/posts/ghost-sender</text>
</svg>
